<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valley Express | Strategic Dispatch</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --asu-maroon: #8C1D40;
            --asu-gold: #FFC627;
            --dark-bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --neon-green: #00FF9C;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--dark-bg);
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* IMMERSIVE BG */
        .stellar-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(140, 29, 64, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255, 198, 39, 0.05) 0%, transparent 40%);
            z-index: -1;
        }

        .dispatch-card {
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(40px);
            padding: 3rem;
            border-radius: 40px;
            width: 100%;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            position: relative;
        }

        .dispatch-card::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, transparent, rgba(255, 198, 39, 0.3), transparent);
            border-radius: 42px;
            z-index: -1;
            opacity: 0.5;
        }

        .pilot-badge {
            display: inline-block;
            background: var(--asu-maroon);
            color: var(--asu-gold);
            padding: 8px 20px;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 2rem;
            border: 1px solid rgba(255,198,39,0.3);
            text-transform: uppercase;
        }

        h1 { font-size: 2.5rem; font-weight: 700; letter-spacing: -1px; margin-bottom: 0.5rem; }
        .subheadline { opacity: 0.5; font-size: 0.9rem; margin-bottom: 3rem; letter-spacing: 1px; }

        .input-group { position: relative; margin-bottom: 2rem; }
        input {
            width: 100%;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            color: white;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        input:focus {
            background: rgba(255,255,255,0.1);
            border-color: var(--asu-gold);
            outline: none;
            box-shadow: 0 0 30px rgba(255, 198, 39, 0.1);
        }

        .cta-btn {
            width: 100%;
            padding: 22px;
            background: var(--asu-gold);
            color: black;
            border: none;
            border-radius: 20px;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.4s;
            text-transform: uppercase;
        }

        .cta-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 20px 40px rgba(255, 198, 39, 0.2);
        }

        .telemetry-overlay {
            display: none;
            margin-top: 2rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--neon-green);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* MISSION SECTION */
        #mission-hub {
            display: none;
            margin-top: 3rem;
            text-align: left;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .mission-strip {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 24px;
            border-left: 4px solid var(--asu-gold);
            transition: 0.5s;
        }

        .mission-active {
            border-left-color: var(--neon-green);
            background: rgba(0, 255, 156, 0.05);
            box-shadow: 0 0 40px rgba(0, 255, 156, 0.1);
        }

        .mission-title { font-weight: 700; color: white; margin-bottom: 5px; font-size: 1.1rem; }
        .mission-meta { font-size: 0.8rem; opacity: 0.6; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="stellar-bg"></div>

    <div class="dispatch-card">
        <div class="pilot-badge">Sovereign Uplink v3.1</div>
        <h1>VALLEY EXPRESS</h1>
        <p class="subheadline">LOGISTICS COMMAND & CONTROL</p>

        <div id="auth-gate">
            <div class="input-group">
                <input type="text" id="callsign" placeholder="ENTER PILOT CALLSIGN" spellcheck="false">
            </div>
            <button class="cta-btn" onclick="engageUplink()">Engage Command Link</button>
        </div>

        <div id="telemetry" class="telemetry-overlay">
            [PULSE: ACTIVE] | <span id="pos-data">NEGOTIATING GPS...</span>
        </div>

        <div id="mission-hub">
            <div class="mission-strip" id="mission-status-card">
                <div class="mission-title" id="m-title">Standby Mode</div>
                <div class="mission-meta" id="m-meta">Awaiting secure dispatch from Central Command. Your signal is being masked.</div>
            </div>
        </div>
    </div>

    <script>
        let pilotID = "";

        function engageUplink() {
            const val = document.getElementById('callsign').value;
            if(!val) return;
            pilotID = val.toUpperCase();

            document.getElementById('auth-gate').style.display = 'none';
            document.getElementById('telemetry').style.display = 'block';
            document.getElementById('mission-hub').style.display = 'block';

            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(pushPulse, null, {enableHighAccuracy: true});
            }

            syncMissions();
            setInterval(syncMissions, 10000); // Pulse every 10s
        }

        function pushPulse(pos) {
            document.getElementById('pos-data').innerText = `LAT: ${pos.coords.latitude.toFixed(4)} LON: ${pos.coords.longitude.toFixed(4)}`;
            try {
                google.script.run.processDelivery({
                    driverName: pilotID,
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude,
                    status: "ACTIVE"
                });
            } catch(e) {}
        }

        function syncMissions() {
            try {
                google.script.run
                    .withSuccessHandler(updateUI)
                    .getSheetData("Jobs");
            } catch(e) {}
        }

        function updateUI(jobs) {
            const activeMission = jobs.find(j => j.Status && j.Status.includes(`DISPATCHED TO ${pilotID}`));
            const card = document.getElementById('mission-status-card');
            const title = document.getElementById('m-title');
            const meta = document.getElementById('m-meta');

            if(activeMission) {
                card.classList.add('mission-active');
                title.innerText = activeMission["Job Description"] || "MISSION DEPLOYED";
                meta.innerHTML = `<strong>LOCATION:</strong> ${activeMission.Company}<br><strong>CARGO:</strong> ${activeMission["Load Type"]}<br><strong>PAY:</strong> ${activeMission.Pay}`;
            } else {
                card.classList.remove('mission-active');
                title.innerText = "Standby: Masked";
                meta.innerText = "Awaiting secure dispatch from Central Command. Your identity is protected.";
            }
        }
    </script>
</body>
</html>
